appId: com.metis.app
productName: Metis
directories:
  output: release
  buildResources: resources
files:
  - dist/**
  - electron/**
  - package.json
extraResources:
  - from: resources/backend-dist
    to: backend-dist
    filter:
      - "**/*"
      - "!**/__pycache__/**"
      - "!**/*.pyc"
      - "!**/*.msi"
      - "!**/*.key"
      - "!**/*.pfx"
      - "!.env"
      - "!**/.env"
      - "!var/rely/**/weights/**"
  - from: resources/icons
    to: icons
  # Phase 8.4: runtime-pack is NO LONGER bundled into the installer.
  # The app downloads it on first run from METIS_RUNTIME_PACK_URL (a GitHub
  # release manifest pointing at the rich-rootfs zip). This keeps the installer
  # small (~50MB instead of ~1GB) and lets us ship pack updates without rebuilding.
  - from: resources/runtime-svc
    to: runtime-svc
win:
  target:
    - nsis
  icon: resources/icons/logo.ico
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  shortcutName: Metis
  uninstallDisplayName: Metis
  warningsAsErrors: false
