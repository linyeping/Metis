name: CI

on: [push, pull_request]

jobs:
  frontend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd desktop && npm ci
      - run: cd desktop && npm run typecheck
      - run: cd desktop && npm run test:contracts

  backend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -e backend/
      - run: pip install pytest
      - run: python -m pytest backend/tests/ -q

  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install ruff
      - run: ruff check backend/ --select E,W,F --ignore E501,W291,W292,W293 --exclude backend/tools/coding --exclude backend/var --exclude backend/build --exclude backend/others --exclude backend/output --exclude backend/packaging_blueprint
